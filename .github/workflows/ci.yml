name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate example manifest
        run: python3 scripts/validate_task.py examples/task-manifest.example.json
      - name: Floor tests (offline, mock provider)
        run: python3 tests/test_m0.py
